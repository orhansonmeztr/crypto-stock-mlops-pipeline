name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        uv sync --all-extras --dev

    - name: Run Pre-commit Hooks (Code Quality)
      run: |
        # Run ruff check and format explicitly (pre-commit can be slow or flaky in CI sometimes)
        uv run ruff check .
        uv run ruff format --check .

    - name: Run Unit Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        # Only run unit tests to avoid external dependency failures
        uv run pytest tests/unit/
