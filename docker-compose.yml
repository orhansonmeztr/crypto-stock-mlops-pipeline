services:
  api:
    build: .
    image: crypto-stock-api:v1
    container_name: crypto-prediction-api
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=${API_PORT:-8000}
      - API_KEY=${API_KEY}
    volumes:
      - ./data/predictions:/app/data/predictions
