name: CD - Model Training Pipeline

on:
  workflow_dispatch:

jobs:
  train-and-log-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv venv
          uv pip install .
          uv pip install dvc[gdrive]

      - name: Create DVC credentials file
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
        run: |
          mkdir -p .dvc/tmp
          echo "${GDRIVE_CREDENTIALS_DATA}" > .dvc/tmp/gdrive-user-credentials.json

      - name: Authenticate DVC and Pull Data
        run: |
          # This is the final, magic command.
          # It forces DVC to treat our user credentials as a non-interactive service account key.
          uv run dvc remote modify gdrive gdrive_service_account_json_file_path .dvc/tmp/gdrive-user-credentials.json

          # Now, pull the data. DVC will not ask for interactive login.
          uv run dvc pull -f

      - name: Run Model Training Script
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_EXPERIMENT_PATH: ${{ secrets.DATABRICKS_EXPERIMENT_PATH }}
        run: |
          uv run python src/models/train_model.py
