name: CI - Code Quality Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-cache-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install dependencies using uv
        run: |
          pip install uv
          uv venv
          # Install dependencies specified in [project.optional-dependencies]
          uv pip install ".[dev]"

      - name: Run pre-commit hooks
        run: |
          # Run the hooks inside the created virtual environment
          uv run pre-commit run --all-files
