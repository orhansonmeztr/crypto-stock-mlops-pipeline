name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        uv sync --all-extras --dev

    - name: Run Pre-commit Hooks (Code Quality)
      run: |
        # Run pre-commit hooks within the uv environment
        uv run pre-commit run --all-files

    - name: Run Unit Tests
      run: |
        # Set PYTHONPATH to current directory to allow module imports during testing
        export PYTHONPATH=$PYTHONPATH:.
        uv run pytest tests/unit/test_initial.py
