name: CD - Model Training Pipeline

on:
  workflow_dispatch:  # Allows manual triggering from the GitHub UI

jobs:
  train-and-log-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies into a new uv virtual environment
        run: |
          pip install uv
          uv venv
          uv pip install .

      - name: Setup Google Drive and Pull Data with DVC
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
        run: |
          # Create the credentials file that DVC expects
          mkdir -p .dvc/tmp
          echo "$GDRIVE_CREDENTIALS_DATA" > .dvc/tmp/gdrive-user-credentials.json

          # Install DVC and its Google Drive dependency into the same venv
          uv pip install dvc[gdrive]

          # Pull the data, running the command inside the venv
          uv run dvc pull -f

      - name: Run Model Training Script
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_EXPERIMENT_PATH: ${{ secrets.DATABRICKS_EXPERIMENT_PATH }}
        run: |
          # Run the training script inside the venv
          uv run python src/models/train_model.py
