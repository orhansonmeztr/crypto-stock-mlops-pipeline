name: CD - Model Training Pipeline

on:
  workflow_dispatch:

jobs:
  train-and-log-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies into a new uv virtual environment
        run: |
          pip install uv
          uv venv
          uv pip install .

      - name: Create DVC credentials file from secret
        uses: jakejarvis/create-file-action@v4
        with:
          file-name: .dvc/tmp/gdrive-user-credentials.json
          content: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}

      # --- REVISION: Force DVC to use a non-interactive mode ---
      - name: Pull Data with DVC in Headless Mode
        run: |
          uv pip install dvc[gdrive]

          # This is the magic command: It tells DVC globally to never ask for user input.
          uv run dvc config core.no_scm true
          uv run dvc config core.interactive false

          # Now, pull the data
          uv run dvc pull -f

      - name: Run Model Training Script
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_EXPERIMENT_PATH: ${{ secrets.DATABRICKS_EXPERIMENT_PATH }}
        run: |
          uv run python src/models/train_model.py
