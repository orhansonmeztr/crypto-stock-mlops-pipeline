name: CD - Model Training Pipeline

on:
  workflow_dispatch:

jobs:
  train-and-log-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv venv
          uv pip install .
          uv pip install dvc[s3]

      - name: Configure AWS Credentials and Pull Data from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_DVC_REMOTE_URL: ${{ secrets.S3_DVC_REMOTE_URL }}
        run: |
          # Use the full URL from secrets to add the remote
          uv run dvc remote add s3-storage ${S3_DVC_REMOTE_URL}

          # Configure credentials for this remote
          uv run dvc remote modify s3-storage --local access_key_id ${AWS_ACCESS_KEY_ID}
          uv run dvc remote modify s3-storage --local secret_access_key ${AWS_SECRET_ACCESS_KEY}

          # Pull data from the correctly configured remote
          uv run dvc pull -r s3-storage

      - name: Run Model Training Script
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_EXPERIMENT_PATH: ${{ secrets.DATABRICKS_EXPERIMENT_PATH }}
        run: |
          uv run python src/models/train_model.py
