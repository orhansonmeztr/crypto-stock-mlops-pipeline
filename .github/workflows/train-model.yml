name: CD - Model Training Pipeline

on:
  schedule:
    - cron: '17 6 * * 1'  # Runs automatically every Monday at 06:17 UTC
  workflow_dispatch: # Allows manual triggering from GitHub Actions UI

jobs:
  train-and-log:
    runs-on: ubuntu-latest
    env:
      # Secrets managed in GitHub Repository Settings
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      DATABRICKS_EXPERIMENT_PATH: ${{ secrets.DATABRICKS_EXPERIMENT_PATH }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        uv sync --frozen

    # --- Pre-Training Checks ---
    - name: Run Unit Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        uv run pytest tests/unit/

    # --- Data Pipeline ---
    - name: Configure DVC and Pull Data
      run: |
        uv run dvc pull

    - name: Run Data Preprocessing
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        uv run python src/data/preprocess.py

    - name: Run Data Validation
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        uv run python src/data/data_validation.py

    - name: Run Feature Engineering
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        uv run python src/features/build_features.py

    # --- Model Training ---
    - name: Run Model Training
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        uv run python src/training/train.py

    # --- Post-Training Validation ---
    - name: Run Model Behavior Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        uv run pytest tests/model_tests/

    # --- Promote Model ---
    - name: Promote Best Model
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        uv run python src/training/promote_model.py

    # --- Push Updated Artifacts to DVC ---
    - name: Push Artifacts to DVC
      run: |
        uv run dvc push
