name: CD - Model Training Pipeline

on:
  workflow_dispatch: # Allows manual triggering from GitHub Actions UI

jobs:
  train-and-log:
    runs-on: ubuntu-latest
    env:
      # Secrets managed in GitHub Repository Settings
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      DATABRICKS_EXPERIMENT_PATH: ${{ secrets.DATABRICKS_EXPERIMENT_PATH }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        uv sync --frozen

    - name: Configure DVC and Pull Data
      run: |
        # Remote configuration 's3-storage' exists in .dvc/config
        # DVC automatically uses the AWS environment variables for authentication
        uv run dvc pull

    - name: Run Model Training Script
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        uv run python src/models/train_model.py
