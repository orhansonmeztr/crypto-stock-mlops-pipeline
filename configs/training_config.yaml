# Configuration for asset selection and training parameters
assets:
  stocks:
    - "Amazon.com"
    - "IBM"
    - "NVIDIA"
  cryptos:
    - "Bitcoin"
    - "Ethereum"
    - "Solana"

training:
  test_size_ratio: 0.2
  validation_folds: 5
  forecast_horizon: 1
  random_state: 42

model_params:
  xgboost:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 5
    objective: "reg:squarederror"
